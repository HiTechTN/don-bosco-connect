services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: don_bosco
      POSTGRES_USER: donbosco
      POSTGRES_PASSWORD: donbosco123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donbosco"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn donbosco_connect.wsgi:application --bind 0.0.0.0:8000"
    environment:
      - DATABASE_URL=postgresql://donbosco:donbosco123@db:5432/don_bosco
      - OLLAMA_BASE_URL=http://ollama:11434
      - DJANGO_SETTINGS_MODULE=donbosco_connect.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-default-secret-key-change-me}
      - DEBUG=False
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  static_volume:
  media_volume: