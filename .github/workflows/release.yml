name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Build Web
        run: |
          cd web
          npm install
          npm run build
          
      - name: Build Mobile
        run: |
          cd mobile
          npm install
          npx expo export --platform web
          
      - name: Zip Web
        run: |
          cd web/dist
          zip -r ../../don-bosco-connect-web.zip .
          
      - name: Zip Mobile
        run: |
          cd mobile/dist
          zip -r ../../don-bosco-connect-mobile.zip .
          
      - name: Upload artifacts to Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Don Bosco Connect ${{ github.ref_name }}" \
            --notes "Release v${{ github.ref_name }}" \
            --draft \
            don-bosco-connect-web.zip \
            don-bosco-connect-mobile.zip

      - name: List Release
        run: |
          gh release list