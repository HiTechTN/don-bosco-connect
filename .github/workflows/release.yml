name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          name: ${{ github.ref_name }}
          body: |
            ##Release Don Bosco Connect v${{ github.ref_name }}
            
            ### Included:
            - Web frontend (production build)
            - Mobile web bundle
            
            ### Installation:
            
            Web: Extract and serve with any web server
            
            Mobile (Web): Host the mobile/dist folder
            
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}