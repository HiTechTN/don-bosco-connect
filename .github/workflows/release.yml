name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Build Web
        run: |
          cd web
          npm install
          npm run build
          
      - name: Build Mobile
        run: |
          cd mobile
          npm install
          npx expo export --platform web
          
      - name: Zip Web
        run: |
          cd web/dist
          zip -r ../../don-bosco-connect-web.zip .
          
      - name: Zip Mobile
        run: |
          cd mobile/dist
          zip -r ../../don-bosco-connect-mobile.zip .
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            don-bosco-connect-web.zip
            don-bosco-connect-mobile.zip
          name: ${{ github.ref_name }}
          body: |
            Don Bosco Connect v${{ github.ref_name }}
            
            ## Web
            Extract and serve:
            ```bash
            unzip don-bosco-connect-web.zip
            cd dist
            npx serve
            ```
            
            ## Mobile (Web)
            Host mobile folder or use with Expo Go
            
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}