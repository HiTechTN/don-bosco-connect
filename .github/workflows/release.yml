name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Build Web
        run: |
          cd web
          npm install
          npm run build
          
      - name: Build Mobile
        run: |
          cd mobile
          npm install
          npx expo export --platform web
          
      - name: Zip Web
        run: |
          cd web/dist
          zip -r ../../don-bosco-connect-web.zip .
          
      - name: Zip Mobile
        run: |
          cd mobile/dist
          zip -r ../../don-bosco-connect-mobile.zip .
          
      - name: Create Release with API
        run: |
          TAG="${{ github.ref_name }}"
          RELEASE_NOTES="Don Bosco Connect $TAG - Web & Mobile builds"
          
          # Create release
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"Don Bosco Connect $TAG\",
              \"body\": \"Release $TAG\n\n- Web build\n- Mobile build\" \
            }")
          
          # Upload web zip
          UPLOAD_URL=$(echo $RESPONSE | jq -r .upload_url)
          UPLOAD_URL="${UPLOAD_URL%\{*}"
          
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/zip" \
            --data-binary @don-bosco-connect-web.zip \
            "$UPLOAD_URL?name=don-bosco-connect-web.zip"
            
          # Upload mobile zip
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/zip" \
            --data-binary @don-bosco-connect-mobile.zip \
            "$UPLOAD_URL?name=don-bosco-connect-mobile.zip"
            
      - name: Verify Release
        run: |
          gh release list