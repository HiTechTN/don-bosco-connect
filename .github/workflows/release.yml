name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '22'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            mobile/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Mobile
        continue-on-error: true
        run: |
          cd mobile
          npm ci
          npx expo export --platform web 2>&1 || echo "⚠️ Expo export skipped (non-bloquant)"

      - name: Package builds
        run: |
          cd frontend/dist && zip -r ../../don-bosco-connect-web.zip . && cd ../..
          if [ -d mobile/dist ]; then
            cd mobile/dist && zip -r ../../don-bosco-connect-mobile.zip . && cd ../..
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            don-bosco-connect-web.zip
            don-bosco-connect-mobile.zip
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
