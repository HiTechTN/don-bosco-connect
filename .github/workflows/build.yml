name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Check Django
        run: |
          cd backend
          python manage.py check

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: |
          cd web
          npm install
          
      - name: Build
        run: |
          cd web
          npm run build
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/dist
          retention-days: 30

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: |
          cd mobile
          npm install
          
      - name: Build web bundle
        run: |
          cd mobile
          npx expo export --platform web
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web
          path: mobile/dist
          retention-days: 30

  release:
    needs: [build-web, build-mobile]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/dist
          
      - name: Download mobile artifacts
        uses: actions/download-artifact@v4
        with:
          name: mobile-web
          path: mobile/dist
          
      - name: Zip artifacts
        run: |
          cd web/dist && zip -r ../../don-bosco-web.zip .
          cd mobile/dist && zip -r ../../don-bosco-mobile.zip .
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            don-bosco-web.zip
            don-bosco-mobile.zip
          name: ${{ github.ref_name }}
          body: "Don Bosco Connect v${{ github.ref_name }} - Web & Mobile builds"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}