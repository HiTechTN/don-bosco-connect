name: Build

on:
  push:
    branches: [master]
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd backend
          pip install -r requirements.txt
          python manage.py check

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          cd web
          npm install
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/dist
          retention-days: 30

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          cd mobile
          npm install
          npx expo export --platform web
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-build
          path: mobile/dist
          retention-days: 30