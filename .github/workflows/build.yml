name: Build

on:
  push:
    branches: [master]
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: donbosco
          POSTGRES_USER: donbosco_user
          POSTGRES_PASSWORD: testpass123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installer dépendances
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Vérifier lint
        run: |
          cd backend
          pip install ruff
          ruff check . --output-format=github
      - name: Vérifier import FastAPI
        run: |
          cd backend
          pip install -e .
          python -c "from app.main import app; print('Backend import OK')"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          cd frontend
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 30

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Installer dépendances mobile
        run: |
          cd mobile
          npm ci
      - name: Exporter Expo web
        continue-on-error: true
        run: |
          cd mobile
          npx expo export --platform web 2>&1 || echo "Expo export skipped"
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-build
          path: mobile/dist
          retention-days: 30