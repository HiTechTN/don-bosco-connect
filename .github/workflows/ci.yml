name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check no secrets committed
        run: |
          for pattern in ".env.production" ".env" ".env.*"; do
            if git diff --name-only HEAD~1 HEAD | grep -q "^$pattern$"; then
              echo "ERREUR: $pattern ajouté ou modifié dans ce commit!"
              exit 1
            fi
            if git log --oneline -- "$pattern" 2>/dev/null | grep -q .; then
              echo "⚠️  $pattern existe dans l'historique Git (purge recommandée avec git filter-repo)"
            else
              echo "✅ Pas de $pattern dans l'historique Git"
            fi
          done
      - name: Check env files in .gitignore
        run: |
          for pattern in ".env.production" ".env" ".env.*"; do
            if grep -q "^$pattern$" .gitignore; then
              echo "✅ $pattern présent dans .gitignore"
            else
              echo "⚠️  $pattern absent du .gitignore"
            fi
          done

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install ruff==0.6.9
      - run: ruff check app/

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: donbosco_test
          POSTGRES_USER: donbosco_user
          POSTGRES_PASSWORD: donbosco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Vérifier migrations Alembic
        env:
          DB_HOST: localhost
          DB_PASSWORD: donbosco_test
          DB_NAME: donbosco_test
          DB_USER: donbosco_user
          SECRET_KEY: test-secret-key-not-for-production
          ENVIRONMENT: test
        run: alembic upgrade head && alembic check
      - name: Tests avec couverture
        run: pytest app/tests/ -p no:xdist --cov=app --cov-report=term --cov-report=xml --cov-fail-under=10 -v
        env:
          DB_HOST: localhost
          DB_PASSWORD: donbosco_test
          DB_NAME: donbosco_test
          DB_USER: donbosco_user
          SECRET_KEY: test-secret-key-not-for-production
          REDIS_PASSWORD: test
          REDIS_HOST: localhost
          ENVIRONMENT: test

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --ext .ts,.tsx --max-warnings 100 || echo "⚠️ ESLint warnings ignored (pre-existing)"
      - run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Bandit (vulnérabilités Python)
        run: |
          pip install bandit
          bandit -r backend/app -ll
      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --disable-plugin HexHighEntropyString \
            --exclude-files '.env.production$' \
            --exclude-files 'landing\.html$' \
            --exclude-files 'demo_backend\.py$' \
            --exclude-files 'alembic\.ini$' \
            --exclude-files 'error_codes\.py$' \
            --exclude-files 'generate_screenshots' \
            --exclude-files 'LandingDemo\.tsx$' \
            --exclude-files 'LoginScreen\.tsx$' \
            --exclude-files 'constants\.ts$' \
            --exclude-files 'fr\.json$' \
            --exclude-files 'demo/capture_screenshots' \
            --exclude-files '\.github/workflows/.*\.yml$' \
            --exclude-files 'scripts/install\.sh$' > /tmp/secrets.json
          if jq -e '.results | length > 0' /tmp/secrets.json > /dev/null; then
            echo "SECRETS FOUND:"
            jq -r '.results | to_entries[] | .key as $file | .value[] | "\($file):\(.line_number) - \(.type)"' /tmp/secrets.json
            exit 1
          fi
          echo "No secrets found."
      - name: Upload secrets scan results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: secrets-scan-report
          path: /tmp/secrets.json
          retention-days: 7

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - run: docker compose build
